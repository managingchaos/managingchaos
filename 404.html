<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | managingCHAOS</title>
  <meta name="description" content="Page not found." />
  <meta http-equiv="refresh" content="4; url=index.html" />
  <style>
    :root {
      --bg: #111111;
      --text: #201f1c;
      --muted: #3a3834;
      --micro: #77726b;
      --panel: rgba(244, 240, 233, 0.85);
      --panel-border: rgba(32,31,28,.08);
      --panel-shadow: 0 18px 40px rgba(0,0,0,.33);
      --progress-track: rgba(32,31,28,.12);
      --progress-fill: #111111;
      --max: 1200px;
      --radius: 14px;
      --redirect-time: 4s;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background: url('images/mc-home-bg.webp') center center / cover no-repeat;
    }

    .wrap {
      width: min(var(--max), calc(100% - 48px));
      margin: 0 auto;
      padding: 72px 0;
      display: grid;
      grid-template-columns: minmax(320px, 620px);
    }

    .content-box {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--panel-shadow);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 30px 32px 28px;
      max-width: 640px;
    }

    .logo-image {
      display: block;
      width: min(100%, 410px);
      height: auto;
      margin: 0 0 22px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--micro);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(40px, 5vw, 72px);
      line-height: .95;
      letter-spacing: -.03em;
      color: var(--text);
    }

    .subhead {
      margin: 0 0 16px;
      font-size: clamp(22px, 2.1vw, 30px);
      line-height: 1.15;
      letter-spacing: -.02em;
      color: var(--text);
      max-width: 15ch;
    }

    .copy {
      margin: 0 0 22px;
      max-width: 30rem;
      color: var(--muted);
      font-size: clamp(18px, 1.35vw, 20px);
      line-height: 1.5;
    }

    .progress-wrap {
      margin-top: 6px;
    }

    .progress-label {
      margin: 0 0 10px;
      color: var(--micro);
      font-size: 14px;
      line-height: 1.4;
    }

    .progress {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--progress-track);
      position: relative;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: var(--progress-fill);
      border-radius: 999px;
      animation: fillBar var(--redirect-time) linear forwards;
    }

    @keyframes fillBar {
      from { width: 0; }
      to { width: 100%; }
    }

    .fallback-link {
      display: inline-block;
      margin-top: 18px;
      color: var(--muted);
      text-decoration: none;
      font-size: 15px;
    }

    .fallback-link:hover {
      text-decoration: underline;
    }

    .site-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    .footer-chip {
      pointer-events: auto;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(244, 240, 233, 0.32);
      border: 1px solid rgba(32,31,28,.08);
      box-shadow: 0 10px 24px rgba(0,0,0,.06);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: rgba(32,31,28,.72);
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      .page {
        min-height: auto;
        align-items: flex-start;
        background-position: 63% center;
      }

      .wrap {
        width: min(calc(100% - 28px), 680px);
        padding: 28px 0 18px;
        grid-template-columns: 1fr;
      }

      .content-box {
        padding: 24px 22px 22px;
        border-radius: 14px;
        max-width: 100%;
      }

      .logo-image {
        width: min(100%, 360px);
        margin-bottom: 18px;
      }

      h1 {
        font-size: clamp(40px, 12vw, 58px);
      }

      .subhead {
        font-size: clamp(22px, 6vw, 28px);
        max-width: 100%;
      }

      .copy {
        max-width: 100%;
      }

      .site-footer {
        position: static;
        display: flex;
        justify-content: center;
        padding: 0 14px 16px;
        margin-top: 10px;
        pointer-events: auto;
      }

      .footer-chip {
        width: auto;
        max-width: 100%;
        text-align: center;
        font-size: 11px;
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="content-box">
        <img
          class="logo-image"
          src="images/managingCHAOS-home.svg"
          alt="managingCHAOS"
        />

        <p class="eyebrow">Error</p>
        <h1>404</h1>
        <p class="subhead">Looks like this page got away from us.</p>
        <p class="copy">The page you requested does not exist. You’ll be redirected to the home page shortly.</p>

        <div class="progress-wrap">
          <p class="progress-label">Redirecting…</p>
          <div class="progress" aria-hidden="true">
            <div class="progress-bar"></div>
          </div>
        </div>

        <a class="fallback-link" href="index.html">If nothing happens, go back home.</a>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-chip">
      © 2026 managingCHAOS. All rights reserved.
    </div>
  </footer>
</body>
</html>
