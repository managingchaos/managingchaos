<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | managingCHAOS</title>
  <meta name="description" content="Get in touch with managingCHAOS." />
  <link rel="stylesheet" href="assets/css/site.css" />
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="content-box">
        <img
          class="logo-image"
          src="assets/images/managingCHAOS-home.svg"
          alt="managingCHAOS"
        />

        <p class="eyebrow">Contact</p>
        <h1>Let’s talk.</h1>
        <p class="intro">Tell me what is going on, what needs to be solved, or where things feel stuck.</p>

        <form action="https://formspree.io/f/xqegjkbk" method="POST">
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" autocomplete="name" required />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="field">
            <label for="message">What’s going on?</label>
            <textarea id="message" name="message" required></textarea>
          </div>

          <input type="hidden" name="_subject" value="New managingCHAOS inquiry" />
          <input type="hidden" name="_next" value="https://managingchaos.com/" />

          <div class="actions">
            <button class="button" type="submit">Send</button>
            <span class="micro">Quiet, simple, direct.</span>
          </div>
        </form>

        <a class="back-link" href="/">← Back to home</a>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-chip">
      © 2026 managingCHAOS. All rights reserved. <span aria-hidden="true">|</span>
      This site collects limited visitor data for traffic and performance insights.
      <a href="/privacy.html">Privacy Policy</a>.
      <a href="/contact.html">Contact</a>.
    </div>
  </footer>

  <script src="assets/js/tracking.js"></script>
</body>
</html>
