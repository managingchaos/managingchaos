<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | managingCHAOS</title>
  <meta name="description" content="Get in touch with managingCHAOS." />
  <style>
    :root {
      --bg: #ece9e3;
      --text: #201f1c;
      --muted: #3a3834;
      --micro: #77726b;
      --button: #111111;
      --button-text: #ffffff;
      --panel: rgba(244, 240, 233, 0.94);
      --panel-border: rgba(32,31,28,.08);
      --panel-shadow: 0 18px 40px rgba(0,0,0,.08);
      --input-bg: rgba(255,255,255,.86);
      --input-border: rgba(32,31,28,.14);
      --max: 1200px;
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background: url('images/mc-home-bg.webp') center center / cover no-repeat;
    }

    .wrap {
      width: min(var(--max), calc(100% - 48px));
      margin: 0 auto;
      padding: 72px 0;
      display: grid;
      grid-template-columns: minmax(320px, 640px);
    }

    .content-box {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--panel-shadow);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 28px 30px 28px;
      max-width: 640px;
    }

    .logo-image {
      display: block;
      width: min(100%, 410px);
      height: auto;
      margin: 0 0 22px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--micro);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 4vw, 54px);
      line-height: .98;
      letter-spacing: -.03em;
      color: var(--text);
    }

    .intro {
      margin: 0 0 24px;
      max-width: 30rem;
      color: var(--muted);
      font-size: clamp(18px, 1.35vw, 20px);
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 12px;
      padding: 14px 15px;
      font: inherit;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(32,31,28,.35);
      box-shadow: 0 0 0 4px rgba(32,31,28,.08);
      background: rgba(255,255,255,.96);
    }

    textarea {
      min-height: 152px;
      resize: vertical;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 15px 24px;
      border: 0;
      border-radius: 999px;
      background: var(--button);
      color: var(--button-text);
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition: transform .12s ease, opacity .18s ease;
    }

    .button:hover { opacity: .92; }
    .button:active { transform: translateY(1px); }

    .micro {
      color: var(--micro);
      font-size: 14px;
      line-height: 1.4;
    }

    .back-link {
      display: inline-block;
      margin-top: 22px;
      color: var(--muted);
      text-decoration: none;
      font-size: 15px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 720px) {
      .page {
        align-items: flex-end;
        background-position: 63% center;
      }

      .wrap {
        width: min(calc(100% - 28px), 680px);
        padding: 28px 0 24px;
        grid-template-columns: 1fr;
      }

      .content-box {
        padding: 24px 22px 22px;
        border-radius: 14px;
        max-width: 100%;
      }

      .logo-image {
        width: min(100%, 360px);
        margin-bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="content-box">
        <img
          class="logo-image"
          src="images/managingCHAOS-home.svg"
          alt="managingCHAOS"
        />

        <p class="eyebrow">Contact</p>
        <h1>Let’s talk.</h1>
        <p class="intro">Tell me what is going on, what needs to be solved, or where things feel stuck.</p>

        <form action="https://formspree.io/f/your-form-id" method="POST">
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" autocomplete="name" required />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="field">
            <label for="message">What’s going on?</label>
            <textarea id="message" name="message" required></textarea>
          </div>

          <input type="hidden" name="_subject" value="New managingCHAOS inquiry" />

          <div class="actions">
            <button class="button" type="submit">Send</button>
            <span class="micro">Quiet, simple, direct.</span>
          </div>
        </form>

        <a class="back-link" href="index.html">← Back to home</a>
      </section>
    </div>
  </main>
</body>
</html>
