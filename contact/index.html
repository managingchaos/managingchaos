<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | managingCHAOS</title>
  <meta name="description" content="Get in touch with managingCHAOS." />
  <link rel="icon" href="/assets/images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
  <link rel="stylesheet" href="https://use.typekit.net/bgy7rpx.css">
  <link rel="stylesheet" href="/assets/css/site.css" />
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="content">
        <img class="logo-image" src="/assets/images/managingCHAOS-home.svg" alt="managingCHAOS" />

        <h1 class="page-title">Let’s talk.</h1>
        <p class="intro">Tell me what is going on, what needs to be solved, or where things feel stuck.</p>

        <form id="contact-form" action="https://formspree.io/f/xqegjkbk" method="POST" novalidate>
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" autocomplete="name" required />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="field">
            <label for="message">What’s going on?</label>
            <textarea id="message" name="message" required></textarea>
          </div>

          <input type="hidden" name="_subject" value="New managingCHAOS inquiry" />

          <div class="actions">
            <button class="button" type="submit">Send</button>
            <span class="micro" id="form-status">Quiet, simple, direct.</span>
          </div>
        </form>

        <a class="back-link" href="/">← Back to home</a>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-chip">
      © 2026 managingCHAOS. All rights reserved. <span aria-hidden="true">|</span>
      This site collects limited visitor data for traffic and performance insights.
      <a href="/privacy/">Privacy Policy</a>.
      <a href="/contact/">Contact</a>.
    </div>
  </footer>

  <script src="/assets/js/tracking.js"></script>
  <script>
    (function () {
      const form = document.getElementById('contact-form');
      const statusEl = document.getElementById('form-status');

      if (!form || !statusEl) return;

      form.addEventListener('submit', async function (event) {
        event.preventDefault();

        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        statusEl.textContent = 'Sending...';

        const submitButton = form.querySelector('button[type="submit"]');
        if (submitButton) submitButton.disabled = true;

        const formData = new FormData(form);

        try {
          const response = await fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
              'Accept': 'application/json'
            }
          });

          if (response.ok) {
            window.location.href = '/thank-you/';
            return;
          }

          let message = 'Something went wrong. Please try again.';
          try {
            const data = await response.json();
            if (data && data.errors && data.errors.length) {
              message = data.errors.map(err => err.message).join(' ');
            }
          } catch (e) {}

          statusEl.textContent = message;
        } catch (error) {
          statusEl.textContent = 'Something went wrong. Please try again.';
        } finally {
          if (submitButton) submitButton.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
